    <text x="547" y="155" fill="#FF7CB8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="2.4" text-anchor="middle">GIT WORKTREE CLI</text>

    <text x="440" y="244" fill="#F5F8FF" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">
