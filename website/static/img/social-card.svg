    <path d="M190 436V194" stroke="#717B8D" stroke-width="10" stroke-linecap="round"/>
    <path d="M318 436V194" stroke="#717B8D" stroke-width="10" stroke-linecap="round"/>
    <path d="M190 400C190 301 318 314 318 194" stroke="url(#warpStroke)" stroke-width="38" stroke-linecap="round" opacity="0.15"/>
    <path d="M190 400C190 301 318 314 318 194" stroke="url(#warpStroke)" stroke-width="18" stroke-linecap="round" opacity="0.28"/>
