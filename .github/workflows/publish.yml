name: Publish

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

  publish:
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        needs.test.result == 'success'
      )
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve version and tag
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            EXPECTED="${{ inputs.version }}"
            EXPECTED="${EXPECTED#v}"
            if [[ "$VERSION" != "$EXPECTED" ]]; then
              echo "Error: package.json version ($VERSION) does not match input ($EXPECTED)" >&2
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published on npm
        id: published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if npm view "${PACKAGE_NAME}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.published.outputs.result != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: steps.published.outputs.result != 'true'
        run: pnpm build

      - name: Generate man pages
        if: steps.published.outputs.result != 'true'
        run: pnpm generate-man

      - name: Resolve npm dist-tag
        if: steps.published.outputs.result != 'true'
        id: npm_tag
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.published.outputs.result != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --ignore-scripts --provenance --tag "${{ steps.npm_tag.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1 || \
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
