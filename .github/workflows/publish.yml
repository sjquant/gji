name: Publish

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

  tag-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      publish: ${{ steps.version_tag.outputs.publish }}
      ref: ${{ steps.version_tag.outputs.ref }}
      tag: ${{ steps.version_tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or reuse the current package version tag
        id: version_tag
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/version-tag.mjs

  publish:
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (needs.tag-version.result == 'success' && needs.tag-version.outputs.publish == 'true')
      )
    needs: tag-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Determine ref and tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            echo "ref=refs/tags/v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ needs.tag-version.outputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ needs.tag-version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Check whether version is already published
        id: published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.published.outputs.published != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: steps.published.outputs.published != 'true'
        run: pnpm build

      - name: Resolve npm dist-tag
        if: steps.published.outputs.published != 'true'
        id: npm_tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "v$VERSION" != "${{ steps.meta.outputs.tag }}" ]]; then
            echo "Expected tag ${{ steps.meta.outputs.tag }} to match package version v$VERSION" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.published.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --ignore-scripts --provenance --tag "${{ steps.npm_tag.outputs.tag }}"
