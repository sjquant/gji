name: Publish

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

  publish:
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        needs.test.result == 'success'
      )
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve version and tag
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            EXPECTED="${{ inputs.version }}"
            EXPECTED="${EXPECTED#v}"
            if [[ "$VERSION" != "$EXPECTED" ]]; then
              echo "Error: package.json version ($VERSION) does not match input ($EXPECTED)" >&2
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published on npm
        id: published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if npm view "${PACKAGE_NAME}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.published.outputs.result != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: steps.published.outputs.result != 'true'
        run: pnpm build

      - name: Generate man pages
        if: steps.published.outputs.result != 'true'
        run: pnpm generate-man

      - name: Bundle for Homebrew
        if: steps.published.outputs.result != 'true'
        run: pnpm bundle

      - name: Smoke-test bundle
        if: steps.published.outputs.result != 'true'
        run: node dist/gji --version

      - name: Create Homebrew tarball
        if: steps.published.outputs.result != 'true'
        id: tarball
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TARBALL="gji-v${VERSION}.tar.gz"
          mkdir -p homebrew-release/bin homebrew-release/libexec homebrew-release/man/man1
          cp dist/gji homebrew-release/bin/gji
          chmod 755 homebrew-release/bin/gji
          cp dist/gji-bundle.mjs homebrew-release/libexec/gji-bundle.mjs
          cp man/man1/*.1 homebrew-release/man/man1/ 2>/dev/null || true
          tar -czf "$TARBALL" -C homebrew-release .
          SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Resolve npm dist-tag
        if: steps.published.outputs.result != 'true'
        id: npm_tag
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.published.outputs.result != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --ignore-scripts --provenance --tag "${{ steps.npm_tag.outputs.tag }}"

      - name: Create GitHub release
        if: steps.published.outputs.result != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1 || \
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"

      - name: Upload Homebrew tarball to release
        if: steps.published.outputs.result != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "${{ steps.tarball.outputs.tarball }}" --clobber

      - name: Update Homebrew formula
        if: steps.published.outputs.result != 'true' && steps.tarball.outputs.sha256 != ''
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          SHA256="${{ steps.tarball.outputs.sha256 }}"
          URL="https://github.com/sjquant/gji/releases/download/${TAG}/gji-v${VERSION}.tar.gz"
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/gji.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/gji.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gji.rb
          git diff --staged --quiet || git commit -m "Update Homebrew formula to ${TAG}"
          git push origin main
