repos:
  - repo: local
    hooks:
      - id: biome
        name: Biome (lint + format)
        language: system
        entry: pnpm exec biome check --write --no-errors-on-unmatched
        types_or: [ts, tsx, javascript, jsx]
      - id: typecheck
        name: TypeScript type check
        language: system
        entry: pnpm tsc --noEmit
        pass_filenames: false
        types_or: [ts, tsx]
